services:
  app:
    image: node:22-alpine
    container_name: cuyo_smart_sas-dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=https://desarrollo.gen.net.ar
    env_file:
      - .env.local
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
